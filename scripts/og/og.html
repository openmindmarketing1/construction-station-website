<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: "Plus Jakarta Sans", sans-serif;
    background: #1a2744;
    position: relative;
    color: #fff;
  }

  /* Right: kitchen photo with diagonal clip */
  .photo {
    position: absolute;
    top: 0; right: 0;
    width: 640px; height: 630px;
    background: url("kitchen-after.jpg") center / cover no-repeat;
    clip-path: polygon(18% 0, 100% 0, 100% 100%, 0 100%);
  }
  .photo::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(100deg, rgba(26,39,68,0.95) 0%, rgba(26,39,68,0.35) 38%, rgba(26,39,68,0.05) 70%);
  }

  /* Navy texture (matches .texture-navy in globals.css) */
  .texture {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(135deg, rgba(201,162,39,0.05) 0%, transparent 50%),
      radial-gradient(circle at 20% 30%, rgba(201,162,39,0.10) 0%, transparent 50%);
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 660px; height: 630px;
    padding: 78px 0 70px 72px;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  .eyebrow {
    display: flex; align-items: center; gap: 14px;
    color: #c9a227;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 38px;
    white-space: nowrap;
  }
  .eyebrow .line { width: 46px; height: 1px; background: #c9a227; flex-shrink: 0; }

  h1 {
    font-family: "DM Serif Display", serif;
    font-weight: 400;
    font-size: 92px;
    line-height: 1.0;
    margin-bottom: 30px;
  }
  h1 .gold { color: #c9a227; font-style: italic; }

  .sub {
    color: rgba(255,255,255,0.82);
    font-size: 26px;
    line-height: 1.5;
    max-width: 540px;
    margin-bottom: auto;
  }
  .sub strong { color: #fff; font-weight: 600; }

  .badges {
    display: flex; align-items: center; gap: 28px;
    margin-top: 40px;
  }
  .badge {
    border-left: 2px solid #c9a227;
    padding-left: 16px;
  }
  .badge .value {
    font-family: "DM Serif Display", serif;
    font-size: 30px;
    line-height: 1.1;
    color: #fff;
  }
  .badge .label {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .footer {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 64px;
    background: #c9a227;
    color: #1a2744;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 72px;
    font-weight: 700;
    font-size: 21px;
    letter-spacing: 0.06em;
    z-index: 3;
  }
  .footer .lic { font-weight: 600; font-size: 18px; letter-spacing: 0.12em; }
</style>
</head>
<body>
  <div class="texture"></div>
  <div class="photo"></div>
  <div class="content">
    <div class="eyebrow"><span class="line"></span>Licensed General Contractor</div>
    <h1>Construction<br /><span class="gold">Station</span></h1>
    <div class="sub">Kitchen, bath &amp; ADU remodeling across the <strong>Inland Empire</strong> — since 2008.</div>
    <div class="badges">
      <div class="badge"><div class="value">5.0★</div><div class="label">Google Rating</div></div>
      <div class="badge"><div class="value">A+</div><div class="label">BBB Rated</div></div>
      <div class="badge"><div class="value">18 yrs</div><div class="label">Experience</div></div>
    </div>
  </div>
  <div class="footer">
    <span>constructionstation.com&ensp;·&ensp;909-797-6333</span>
    <span class="lic">CSLB #1108879</span>
  </div>
</body>
</html>
